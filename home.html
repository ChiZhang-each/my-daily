<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyc没事闲的</title>
    <link rel="icon" type="image/png" href="logo.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header-box">
        <div class="logo">Each的日常记录</div>
        <nav class="nav-menu">
            <a href=" ">Home</a >
            <a href="#article">Note</a >
            <a href="aboutme.html">AboutMe</a>
            <button id="modeBtn" class="mode-btn">🌙 深色模式</button>
        </nav>
    </header>

    <div class="container">
        <main class="main-content">
            <!-- 发布日常表单 -->
            <div class="publish-box">
                <h2>写下今日日常</h2>
                <div class="mood-box">
                    <span>选择心情：</span>
                    <label><input type="radio" name="mood" value="开心" checked>😊开心</label>
                    <label><input type="radio" name="mood" value="平淡">😌平淡</label>
                    <label><input type="radio" name="mood" value="疲惫">😔疲惫</label>
                    <label><input type="radio" name="mood" value="治愈">✨治愈</label>
                </div>
                <input type="text" id="articleTitle" placeholder="给这条日常起个标题..." class="input-title">
                <textarea id="articleContent" placeholder="记录生活、美食、风景、碎碎念..." class="input-content"></textarea>
                <input type="file" id="imgUpload" accept="image/*">
                <button id="submitBtn" class="submit-btn">发布我的日常</button>
            </div>

            <!-- 动态列表容器 -->
            <h2 id="article">我的全部动态</h2>
            <div id="articleList" class="article-list"></div>
        </main>

        <!-- 右侧侧边栏 -->
        <aside class="sidebar">
            <div class="side-box">
                <h3>个人简介</h3>
                <p>记录平淡生活里的点点滴滴</p >
            </div>
            <div class="side-box">
                <h3>我的朋友</h3>
                <ul class="friend-link-list">
                    <li class="friend-item">
                        <div class="friend-text-wrap">
                            <p class="friend-title">好友 @Chi</p>
                            <a href="https://patricia-chi.github.io/" target="_blank">Chi的博客</a>
                            <p class="friend-desc">全世界最可爱的小女孩捏！（膜拜大佬</p>
                        </div>
                    </li>
            <!-- 以后加新朋友，直接复制上面li，修改文字和链接 -->
                </ul>
            </div>
            <div class="side-box">
                <h3>月度归档</h3>
                <ul id="monthArchive"></ul>
                <button id="clearAllBtn" style="margin-top:15px;width:100%;padding:8px;background:#cf675b;color:white;border:none;border-radius:6px;cursor:pointer;">
                    清空所有动态
                </button>
            </div>
        </aside>
    </div>

    <footer class="footer-box">
        <p>我的个人日常网页 · 数据保存在本机浏览器</p >
    </footer>

    <script src="main.js"></script>
    <script>
    // 登录状态校验
    window.onload = function(){
        const loginState = localStorage.getItem('isLogin');
        if(loginState !== 'true'){
            //未登录，强制跳转登录页面
            window.location.href = 'index.html';
            }
    }
    </script>
</body>
</html>
