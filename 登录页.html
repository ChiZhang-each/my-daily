<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #f7f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loginContainer {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 48px 36px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            color: #1d2129;
            margin-bottom: 36px;
            font-weight: 500;
        }

        .form-item {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 15px;
            color: #4e5969;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #dcdfe6;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.25s;
            outline: none;
        }

        input:focus {
            border-color: #4080ff;
            box-shadow: 0 0 0 3px rgba(64, 128, 255, 0.12);
        }

        button[type="submit"] {
            width: 100%;
            height: 48px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background-color: #4080ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
        }

        button[type="submit"]:hover {
            background-color: #2970f5;
        }
        button:disabled{
            background:#82b0ff;
            cursor:not-allowed;
        }

        /* 消息提示 */
        .tip {
            text-align: center;
            margin-top:16px;
            font-size:14px;
            height:20px;
        }
        .error{
            color:#f53f3f;
        }
        .success{
            color:#00b42a;
        }
    </style>
</head>
<body>
    <div id="loginContainer">
        <h1>用户登录</h1>
        <form action="">
            <div class="form-item">
                <label for="username">用户名:</label>
                <input type="text" id="username" name="username">
            </div>
            <div class="form-item">
                <label for="password">密码:</label>
                <input type="password" id="password" name="password">
            </div>
            <div class="form-item">
                <button type="submit" id="loginBtn">登录</button>
            </div>
            <div class="tip" id="msgTip"></div>
        </form>
    </div>

<script>
const loginBtn = document.getElementById('loginBtn');
const msgTip = document.getElementById('msgTip');

loginBtn.addEventListener('click', function(event) {
    event.preventDefault();
    //清空提示
    msgTip.className = 'tip';
    msgTip.innerText = '';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (username === '' || password === '') {
        msgTip.innerText = '用户名和密码不能为空！';
        msgTip.classList.add('error');
        return;
    }
    // 你的账号密码
    if (username === 'each' && password === '070611') {
        msgTip.innerText = '登录成功!';
        msgTip.classList.add('success');
        loginBtn.disabled = true;
        // 写入登录凭证，有效期 24小时
        localStorage.setItem('isLogin', 'true');
        setTimeout(()=>{
            window.location.href = 'index.html';
        }, 800);
    } else {
        msgTip.innerText = '用户名或密码错误，请重试。';
        msgTip.classList.add('error');
    }
});
</script>
</body>
</html>
